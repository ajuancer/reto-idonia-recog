{{define "main"}}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <meta name="csrf-token" content="{{.CSRFToken}}">

    <meta name="robots" content="noindex, nofollow">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Secure Medical Portal | Document Upload</title>
    <meta name="description" content="Secure and encrypted portal to upload medical PDF documents and DICOM imaging files.">
    <meta name="author" content="juancer">

    <meta name="theme-color" content="#2563eb">


    <meta property="og:type" content="website">
    <meta property="og:title" content="Secure Medical Portal">
    <meta property="og:description" content="Securely upload your medical documents and imaging files.">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Secure Medical Portal">
    <meta name="twitter:description" content="Securely upload your medical documents and imaging files.">


    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans text-gray-800">


<main class="relative bg-white p-8 rounded-xl shadow-lg max-w-md w-full border border-gray-100">

    <header class="text-center mb-8">
        <h1 class="text-2xl font-bold" data-i18n="welcome">Welcome!</h1>
        <p class="text-sm text-gray-500 mt-2" data-i18n="subtitle">Upload your PDF and DICOM files.</p>
    </header>


    <div id="errorMessage" class="hidden rounded-md bg-red-50 p-3 mb-4 text-sm text-red-600 border border-red-200">
    </div>

    <form id="uploadForm" class="space-y-6">

        <div class="border-2 border-dashed border-blue-300 rounded-lg p-6 text-center hover:bg-blue-50 focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-transparent transition-all flex flex-col items-center">

            <input type="file" id="fileInput" name="files" multiple accept=".pdf,.dcm" class="sr-only" aria-describedby="fileHelp" />

            <label for="fileInput" class="cursor-pointer flex flex-col items-center w-full">
                <svg aria-hidden="true" class="w-10 h-10 text-blue-500 mb-3" fill="none" stroke="currentColor"
                     viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                </svg>
                <span class="text-blue-600 font-medium" data-i18n="clickToSelect">Click to select files</span>
                <span id="fileHelp" class="text-xs text-gray-400 mt-1" data-i18n="fileHelp">PDF or DICOM up to 100 MB</span>
            </label>


            <div id="fileList" class="mt-4 w-full text-sm text-gray-600 max-h-40 overflow-y-auto flex flex-col gap-2 px-1 border-t border-transparent">
            </div>
        </div>


        <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center focus:ring-4 focus:ring-blue-300 outline-none">
            <span data-i18n="btnUpload">Upload</span>
        </button>



        <section id="processingStatus" class="hidden mt-4 p-4 bg-blue-50 border border-blue-200 rounded-lg flex items-start gap-3" role="status" aria-live="polite">
            <svg class="h-5 w-5 animate-spin text-blue-600 mt-0.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
            </svg>
            <div>
                <p id="processingText" class="text-sm font-semibold text-blue-800"></p>
                <p id="processingHint" class="text-xs text-blue-600" data-i18n="processingHint">Processing may take a minute. Please keep this tab open.</p>
            </div>
        </section>
    </form>


    <section id="resultContainer" class="hidden mt-8 p-6 bg-green-50 border border-green-200 rounded-lg text-center" aria-live="polite">
        <h2 class="text-green-800 font-bold mb-2" data-i18n="resultTitle">Upload Successful</h2>
        <p class="text-sm text-gray-600 mb-5" data-i18n="resultSubtitle">Your files have been processed securely.</p>


        <div class="bg-white p-4 rounded-lg border border-green-100 mb-4 shadow-sm flex flex-col items-center gap-2">
            <span class="block text-xs text-gray-400 uppercase tracking-wide" data-i18n="pinLabel">Access PIN</span>
            <div class="flex items-center gap-3">

                <span id="pinDisplay" class="text-3xl tracking-widest font-mono font-bold text-gray-800 blur-sm select-none transition-all duration-300">
                    123456
                </span>

                <button id="toggleBlur" class="text-gray-400 hover:text-blue-600 transition-colors p-1 outline-none rounded-full focus:ring-2 focus:ring-blue-200" title="Toggle Visibility">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </button>
            </div>
        </div>


        <div class="flex gap-3 mb-5">
            <button id="copyBtn" class="flex-1 bg-white border border-green-200 hover:bg-green-100 hover:border-green-300 text-green-700 text-sm font-semibold py-2.5 px-4 rounded-lg transition-all flex justify-center items-center gap-2 shadow-sm focus:ring-2 focus:ring-green-400 outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
                <span data-i18n="btnCopyPin">Copy PIN</span>
            </button>

            <button id="shareBtn" class="flex-1 bg-white border border-green-200 hover:bg-green-100 hover:border-green-300 text-green-700 text-sm font-semibold py-2.5 px-4 rounded-lg transition-all flex justify-center items-center gap-2 shadow-sm focus:ring-2 focus:ring-green-400 outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                </svg>
                <span data-i18n="btnShare">Share</span>
            </button>
        </div>

        <a id="urlDisplay" href="#" class="inline-block text-blue-600 hover:text-blue-800 hover:underline text-sm font-medium transition-colors outline-none focus:ring-2 focus:ring-blue-500 rounded px-1">
            <span data-i18n="linkPortal">Go to Idonia portal</span> &rarr;
        </a>
    </section>
</main>


<div id="toastNotification" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 translate-y-10 opacity-0 transition-all duration-300 pointer-events-none flex items-center gap-2 z-50 bg-gray-800 text-white px-4 py-3 rounded-lg shadow-xl">

    <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
    </svg>
    <span class="text-sm font-medium tracking-wide" data-i18n="toastCopied">PIN copied to clipboard!</span>
</div>

<script src="../static/i18n.js"></script>
<script src="../static/upload.js"></script>
<script src="../static/result-section.js"></script>
</body>
</html>
{{end}}
